name: route-eval

on:
  pull_request:
    paths:
      - "backend/**"
      - "eval/**"
      - "scripts/**"
      - ".github/workflows/eval.yml"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      LOCAL_ROUTE_DISABLE_ENV_FILE: "1"
      PYTHONPATH: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          elif [ -f backend/pyproject.toml ]; then
            pip install backend/.
          else
            echo "No backend dependency manifest found" && exit 1
          fi
          pip install pyyaml

      - name: Run offline route eval (with quality gate)
        run: |
          mkdir -p data/eval
          python -m eval.run_eval \
            --out data/eval/route_eval.md \
            --enforce-gate

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-eval-report
          path: data/eval/route_eval.md
          if-no-files-found: warn
